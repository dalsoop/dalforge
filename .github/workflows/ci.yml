name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v

      - name: Build binaries
        run: |
          go build -o dalcenter ./cmd/dalcenter
          go build -o dalcli ./cmd/dalcli
          go build -o dalcli-leader ./cmd/dalcli-leader
          echo "Built 3 binaries"
